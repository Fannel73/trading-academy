<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Academy — Lernplattform</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#14293d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Trading Academy">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-180.png">

<meta name="description" content="Lokale Trading-Lernplattform. Nur Simulation, kein echtes Geld, keine Anlageberatung.">
<style>
/* Trading Academy — ruhig, professionell, hell. */
:root {
  --bg: #f4f6f9; --panel: #ffffff; --ink: #1c2733; --muted: #5a6b7f;
  --accent: #1e5a8a; --accent-ink: #ffffff; --line: #dde4ec;
  --ok: #1e7a4f; --ok-bg: #e9f5ee; --warn: #9a3b2e; --warn-bg: #faeeec;
  --note-bg: #eef4fb; --radius: 12px;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
  background: var(--bg); color: var(--ink);
}
#app { display: flex; min-height: 100vh; }

/* Navigation */
.nav {
  width: 210px; flex-shrink: 0; background: #14293d; color: #cfdcea;
  padding: 20px 12px; display: flex; flex-direction: column; gap: 4px;
  position: sticky; top: 0; height: 100vh;
}
.nav-brand { font-size: 19px; font-weight: 700; color: #fff; padding: 4px 10px 18px; letter-spacing: 0.2px; }
.nav-brand span { color: #7fb2df; font-weight: 400; }
.nav-item { color: #cfdcea; text-decoration: none; padding: 9px 10px; border-radius: 8px; font-size: 15px; }
.nav-item:hover { background: rgba(255,255,255,0.08); }
.nav-item.active { background: #1e5a8a; color: #fff; }
.nav-ic { margin-right: 8px; }
.nav-foot { margin-top: auto; font-size: 11.5px; color: #8ba1b7; padding: 10px; border-top: 1px solid rgba(255,255,255,0.12); }

/* Hauptbereich */
.main { flex: 1; max-width: 860px; padding: 28px 36px 80px; }
h1 { font-size: 26px; margin: 6px 0 8px; }
h2 { font-size: 19px; margin: 26px 0 10px; }
h3 { font-size: 16.5px; margin: 22px 0 8px; }
.section-h { margin-top: 34px; }
.muted { color: var(--muted); }
.small { font-size: 13.5px; }
.back { display: inline-block; color: var(--accent); text-decoration: none; margin-bottom: 6px; font-size: 14.5px; }
.pill { display: inline-block; background: var(--note-bg); color: var(--accent); border-radius: 999px; padding: 2px 12px; font-size: 13px; margin-left: 10px; vertical-align: middle; }
.done-pill { background: var(--ok-bg); color: var(--ok); }
.lesson-head { display: flex; align-items: center; flex-wrap: wrap; }

/* Karten */
.card { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); padding: 18px 20px; margin: 14px 0; }
.card-kicker { font-size: 12px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 4px; }
.cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin: 16px 0; }
.card.stat { text-align: center; padding: 14px; margin: 0; }
.stat-num { font-size: 30px; font-weight: 700; color: var(--accent); }
.stat-label { font-size: 13px; color: var(--muted); }
.next-card { border-left: 4px solid var(--accent); }
.muted-card { background: #eef1f5; color: var(--muted); font-size: 14.5px; }
.ok-card { background: var(--ok-bg); border-color: #bfe0cd; }
.warn-card { background: var(--warn-bg); border-color: #eccfc9; }
.goal { background: var(--note-bg); border-color: #cdddef; }
.module-r { border-left: 4px solid #7a5c1e; }
.module-r.complete { border-left-color: var(--ok); }

/* Banner */
.banner { padding: 12px 16px; border-radius: 10px; margin-bottom: 16px; font-size: 14.5px; }
.banner.warn { background: var(--warn-bg); border: 1px solid #eccfc9; }

/* Buttons */
.btn {
  display: inline-block; background: #e8edf3; color: var(--ink); border: 1px solid var(--line);
  border-radius: 9px; padding: 9px 18px; font-size: 15px; cursor: pointer; text-decoration: none;
  margin: 6px 8px 6px 0; font-family: inherit;
}
.btn:hover { background: #dbe3ec; }
.btn.primary { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
.btn.primary:hover { background: #17466c; }
.btn.primary:disabled { background: #9fb4c7; border-color: #9fb4c7; cursor: not-allowed; }
.btn.danger { background: #fbeae7; color: var(--warn); border-color: #eccfc9; }
.btn.chip { padding: 6px 14px; font-size: 14px; }
.btn.chip.sel-ok { background: var(--ok-bg); border-color: var(--ok); color: var(--ok); }
.btn.chip.sel-bad { background: var(--warn-bg); border-color: var(--warn); color: var(--warn); }
.file-btn { position: relative; overflow: hidden; }

/* Lernpfad */
.phase { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); margin: 10px 0; }
.phase summary { display: flex; align-items: center; gap: 10px; padding: 13px 16px; cursor: pointer; list-style: none; }
.phase summary::-webkit-details-marker { display: none; }
.phase[data-locked="1"] summary { opacity: 0.62; }
.ph-title { font-weight: 600; flex: 1; }
.ph-meta { color: var(--muted); font-size: 13.5px; }
.phase-body { padding: 4px 16px 14px; }
.phase-locked-note { color: var(--muted); font-size: 14px; padding: 6px 2px 4px; }
.lesson-list { margin-top: 8px; }
.lesson-row {
  display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 9px;
  text-decoration: none; color: var(--ink); border: 1px solid transparent; margin: 3px 0; font-size: 15px;
}
a.lesson-row:hover { background: var(--note-bg); border-color: #cdddef; }
.lesson-row.locked, .lesson-row.planned { color: var(--muted); }
.lesson-row.done .lr-title { color: var(--ok); }
.lr-title { flex: 1; }
.lr-meta { font-size: 12.5px; color: var(--muted); }

/* Lektionen */
.lesson-content p { margin: 12px 0; }
.terms { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.term { background: var(--panel); border: 1px solid var(--line); border-radius: 9px; padding: 2px 12px; }
.term summary { cursor: pointer; font-weight: 600; padding: 8px 0; font-size: 14.5px; }
.term p { margin: 2px 0 10px; font-size: 14.5px; color: var(--muted); }
.deep { background: var(--panel); border: 1px solid var(--line); border-radius: 9px; padding: 2px 14px; margin: 8px 0; }
.deep summary { cursor: pointer; font-weight: 600; padding: 9px 0; color: var(--accent); }
.note { background: var(--note-bg); border-radius: 10px; padding: 12px 16px; margin: 14px 0; font-size: 15px; }
.warnbox { background: var(--warn-bg); border-radius: 10px; padding: 12px 16px; margin: 14px 0; font-size: 15px; }
.figure { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); padding: 10px; margin: 16px 0; }
.figure svg { width: 100%; height: auto; display: block; }
.tablewrap { overflow-x: auto; margin: 14px 0; }
table { border-collapse: collapse; width: 100%; background: var(--panel); font-size: 14.5px; }
caption { text-align: left; font-weight: 600; padding: 6px 2px; font-size: 14px; }
th, td { border: 1px solid var(--line); padding: 8px 12px; text-align: left; }
th { background: #eef2f7; }

/* Rechner */
.calc { background: var(--panel); border: 1px dashed #b9c8d8; border-radius: var(--radius); padding: 14px 16px; margin: 18px 0; }
.calc-title { font-weight: 600; margin-bottom: 10px; }
.calc-fields { display: flex; flex-wrap: wrap; gap: 12px; }
.calc-field { display: flex; flex-direction: column; gap: 4px; font-size: 13.5px; color: var(--muted); min-width: 130px; flex: 1; margin: 6px 0; }
.calc-field input, .calc-field select {
  padding: 8px 10px; border: 1px solid var(--line); border-radius: 8px; font-size: 15px; font-family: inherit; background: #fff; color: var(--ink);
}
.calc-out { margin-top: 12px; background: var(--note-bg); border-radius: 8px; padding: 10px 14px; font-size: 15px; min-height: 20px; }

/* Quiz */
.q { border: 1px solid var(--line); border-radius: 10px; background: var(--panel); padding: 12px 16px; margin: 12px 0; }
.q legend { font-weight: 600; padding: 0 6px; font-size: 15px; }
.q.ok { border-color: #bfe0cd; background: #fbfefc; border-left: 4px solid var(--ok); }
.q.bad { border-color: #eccfc9; background: #fffbfa; border-left: 4px solid var(--warn); }
.q.unanswered { border-left: 4px solid #d9a441; background: #fffdf7; }
.fb-open { color: #9a6b1e; font-weight: 600; }
.q-opt { display: block; padding: 6px 4px; cursor: pointer; font-size: 15px; }
.q-num { padding: 8px 10px; border: 1px solid var(--line); border-radius: 8px; font-size: 15px; width: 180px; font-family: inherit; }
.q-fb { font-size: 14px; margin-top: 8px; color: var(--muted); }
.fb-ok { color: var(--ok); font-weight: 600; }
.fb-bad { color: var(--warn); font-weight: 600; }
.rc { font-size: 13px; }
.quiz-result { margin-top: 10px; }
.summary-box { margin-top: 26px; background: var(--ok-bg); border: 1px solid #bfe0cd; border-radius: var(--radius); padding: 6px 22px 18px; }
.ex-item { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 12px 16px; margin: 10px 0; }
.ex-opts { display: flex; flex-wrap: wrap; }

/* Fortschritt */
.bar { background: #e4eaf1; border-radius: 999px; height: 12px; overflow: hidden; margin: 8px 0 4px; }
.bar-fill { background: var(--accent); height: 100%; border-radius: 999px; transition: width 0.4s; }
.crit { list-style: none; padding: 0; }
.crit li { padding: 6px 0; border-bottom: 1px solid var(--line); font-size: 15px; }
.crit li:last-child { border-bottom: none; }
.crit-done { color: var(--ok); }

/* Glossar */
.search { width: 100%; padding: 11px 14px; border: 1px solid var(--line); border-radius: 10px; font-size: 15.5px; margin: 10px 0 16px; font-family: inherit; }
.glossary-term { margin: 6px 0; }

/* Prüfungs-Zähler, Export-Fallback */
.exam-progress { margin: 12px 0 4px; font-size: 14px; }
.copybox { width: 100%; font: 12px/1.4 ui-monospace, Menlo, monospace; border: 1px solid var(--line); border-radius: 8px; padding: 10px; margin: 8px 0; box-sizing: border-box; }

/* Tastatur-Fokus deutlich sichtbar */
.nav-item:focus-visible, .btn:focus-visible, summary:focus-visible, a:focus-visible,
input:focus-visible, select:focus-visible, textarea:focus-visible {
  outline: 2px solid #7fb2df; outline-offset: 2px;
}

/* Onboarding */
.onboard { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; background: linear-gradient(160deg, #14293d 0%, #1e4260 100%); width: 100%; }
.onboard-card { background: var(--panel); border-radius: 16px; padding: 30px 34px; max-width: 620px; width: 100%; box-shadow: 0 18px 60px rgba(0,0,0,0.35); }
.onboard-card h1 { margin-top: 0; }
.contract-item { display: flex; gap: 10px; align-items: flex-start; padding: 8px 0; font-size: 14.5px; cursor: pointer; }
.contract-item input { margin-top: 4px; flex-shrink: 0; }

/* Responsiv */
@media (max-width: 760px) {
  #app { flex-direction: column; }
  .nav { width: 100%; height: auto; position: static; flex-direction: row; flex-wrap: wrap; align-items: center; padding: 10px; }
  .nav-brand { padding: 4px 10px; font-size: 16px; }
  .nav-item { padding: 7px 9px; font-size: 13.5px; }
  .nav-ic { margin-right: 4px; }
  .nav-foot { display: none; }
  .main { padding: 18px 16px 60px; }
  .terms { grid-template-columns: 1fr; }
  /* Touch-Ziele mindestens ~44px */
  .q-opt { padding: 11px 6px; min-height: 44px; display: flex; align-items: center; gap: 8px; }
  .btn.chip { min-height: 44px; padding: 10px 16px; }
  .btn { min-height: 42px; }
}
</style>
</head>
<body>
<div id="app"></div>
<script>
/* ============================================================
   ENGINE — Finanzmathematik, Quiz-Auswertung, Freischaltung,
   Wiederholungsplanung. Reine Funktionen, ohne DOM-Zugriff.
   ============================================================ */
const ENGINE = (() => {

  // ---------- Zahlen & Formatierung ----------
  // Akzeptiert deutsche Eingaben: "1.234,56" oder "1234.56" oder "12,5"
  function parseNum(input) {
    if (typeof input === 'number') return isFinite(input) ? input : NaN;
    if (input == null) return NaN;
    let s = String(input).trim().replace(/\s/g, '').replace(/AED/gi, '');
    if (s === '') return NaN;
    const hasComma = s.includes(','), hasDot = s.includes('.');
    // Deutsche Tausenderpunkte ohne Komma: "1.000" → 1000
    if (!hasComma && /^\d{1,3}(\.\d{3})+$/.test(s)) return parseFloat(s.replace(/\./g, ''));
    if (hasComma && hasDot) {
      // Das zuletzt auftretende Zeichen ist der Dezimaltrenner
      if (s.lastIndexOf(',') > s.lastIndexOf('.')) s = s.replace(/\./g, '').replace(',', '.');
      else s = s.replace(/,/g, '');
    } else if (hasComma) {
      s = s.replace(',', '.');
    }
    const v = parseFloat(s);
    return isFinite(v) ? v : NaN;
  }

  function fmt(n, dec = 2) {
    if (!isFinite(n)) return '–';
    return n.toLocaleString('de-DE', { minimumFractionDigits: dec, maximumFractionDigits: dec });
  }
  function fmtAED(n, dec = 2) { return fmt(n, dec) + ' AED'; }
  function fmtPct(n, dec = 2) { return fmt(n, dec) + ' %'; }

  // ---------- Risiko-Mathematik ----------
  // Risikobetrag = Kapital × Risiko%   (der maximal geplante Verlust)
  function riskAmount(capitalAED, riskPct) {
    if (!(capitalAED > 0) || !(riskPct > 0)) return NaN;
    return capitalAED * (riskPct / 100);
  }

  // Positionsgröße: Stückzahl = Risikobetrag ÷ Stop-Distanz (abgerundet, ganze Stücke)
  function positionSize(capitalAED, riskPct, entry, stop) {
    const rAED = riskAmount(capitalAED, riskPct);
    if (!isFinite(rAED)) return null;
    if (!(entry > 0) || !(stop > 0)) return null;
    if (stop >= entry) return { error: 'stop_not_below_entry' }; // V1: nur Long ohne Hebel
    const dist = entry - stop;
    // 1e-9-Puffer gegen Fließkomma-Rauschen (z. B. 5/0,1 = 49,999…)
    const shares = Math.floor(rAED / dist + 1e-9);
    const positionValue = shares * entry;
    return {
      riskAmount: rAED,
      stopDistance: dist,
      stopDistancePct: (dist / entry) * 100,
      shares,
      positionValue,
      actualRiskAED: shares * dist,
      exceedsCapital: positionValue > capitalAED
    };
  }

  // Nötige Erholung nach Verlust: Verlust x% → Gewinn x/(1-x) nötig
  function recoveryNeededPct(lossPct) {
    if (!(lossPct > 0) || lossPct >= 100) return NaN;
    return (lossPct / (100 - lossPct)) * 100;
  }

  // Chance-Risiko-Verhältnis (Long): (Ziel-Einstieg)/(Einstieg-Stop)
  function crv(entry, stop, target) {
    if (!(entry > 0) || !(stop > 0) || !(target > 0)) return NaN;
    if (stop >= entry || target <= entry) return NaN;
    return (target - entry) / (entry - stop);
  }

  // R-Multiple eines Ergebnisses: (Ausstieg-Einstieg)/(Einstieg-Stop)
  function rMultiple(entry, stop, exit) {
    if (!(entry > 0) || !(stop > 0) || !isFinite(exit)) return NaN;
    if (stop >= entry) return NaN;
    return (exit - entry) / (entry - stop);
  }

  // Gebühreneffekt: Kauf + Verkauf (fixe Gebühr je Order)
  function feeRoundTrip(positionValueAED, feePerOrderAED) {
    if (!(positionValueAED > 0) || !(feePerOrderAED >= 0)) return NaN;
    const total = feePerOrderAED * 2;
    return { totalFees: total, pctOfPosition: (total / positionValueAED) * 100 };
  }

  // Erwartungswert je Trade: p·G − (1−p)·V  (G/V als positive Beträge)
  function expectancy(winRatePct, avgWin, avgLoss) {
    const p = winRatePct / 100;
    if (!(p >= 0 && p <= 1) || !isFinite(avgWin) || !isFinite(avgLoss)) return NaN;
    return p * avgWin - (1 - p) * avgLoss;
  }

  // Kontostand nach Serie gleicher %-Verluste
  function balanceAfterLosses(capitalAED, lossPctPerTrade, nTrades) {
    if (!(capitalAED > 0) || !(lossPctPerTrade >= 0) || !(nTrades >= 0)) return NaN;
    return capitalAED * Math.pow(1 - lossPctPerTrade / 100, nTrades);
  }

  // ---------- Quiz-Auswertung ----------
  // question: {id, type:'mc'|'num', correct, tol?, points?, riskCritical?}
  // answers:  {questionId: gegebene Antwort}
  function gradeQuestion(q, given) {
    if (given == null || given === '') return false;
    if (q.type === 'mc') return Number(given) === Number(q.correct);
    if (q.type === 'num') {
      const v = parseNum(given);
      if (!isFinite(v)) return false;
      const tol = q.tol != null ? q.tol : Math.max(Math.abs(q.correct) * 0.005, 0.01);
      return Math.abs(v - q.correct) <= tol;
    }
    return false;
  }

  function gradeQuiz(questions, answers) {
    let earned = 0, total = 0;
    const wrong = [], riskCriticalFailed = [];
    for (const q of questions) {
      const pts = q.points || 1;
      total += pts;
      if (gradeQuestion(q, answers[q.id])) earned += pts;
      else {
        wrong.push(q.id);
        if (q.riskCritical) riskCriticalFailed.push(q.id);
      }
    }
    const scorePct = total > 0 ? (earned / total) * 100 : 0;
    return {
      scorePct,
      earned, total, wrong, riskCriticalFailed,
      passed: scorePct >= 80 && riskCriticalFailed.length === 0
    };
  }

  // ---------- Freischaltung ----------
  // Eine Phase wird freigeschaltet, wenn die Vorphase 'done' ist.
  // Eine Lektion gilt als bestanden mit gradeQuiz(...).passed === true.
  function phaseStatus(phaseId, progress) {
    if (phaseId === 0) return progress.phases['0']?.status || 'current';
    const prev = progress.phases[String(phaseId - 1)];
    if (prev && prev.status === 'done') {
      return progress.phases[String(phaseId)]?.status || 'current';
    }
    return progress.phases[String(phaseId)]?.status === 'done' ? 'done' : 'locked';
  }

  // ---------- Wiederholung (einfaches Spaced Repetition) ----------
  const REVIEW_INTERVALS = [1, 3, 7, 21]; // Tage
  function nextReview(prevIntervalIdx, correct, todayISO) {
    const idx = correct ? Math.min((prevIntervalIdx ?? -1) + 1, REVIEW_INTERVALS.length - 1) : 0;
    const d = new Date(todayISO + 'T00:00:00');
    d.setDate(d.getDate() + REVIEW_INTERVALS[idx]);
    // Lokal formatieren (nicht UTC), sonst verrutschen Fälligkeiten je Zeitzone
    const iso = new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().slice(0, 10);
    return { intervalIdx: idx, dueDate: iso };
  }
  function dueReviews(reviews, todayISO) {
    return (reviews || []).filter(r => r.dueDate <= todayISO);
  }

  // ---------- Streak / Lerntage ----------
  function daysBetween(isoA, isoB) {
    return Math.round((new Date(isoB + 'T00:00:00') - new Date(isoA + 'T00:00:00')) / 86400000);
  }
  function computeStreak(learningDays, todayISO) {
    if (!learningDays || learningDays.length === 0) return 0;
    const days = [...new Set(learningDays)].sort();
    const last = days[days.length - 1];
    const gap = daysBetween(last, todayISO);
    if (gap > 1 || gap < 0) return 0; // weder heute noch gestern (oder Uhr verstellt)
    let streak = 1;
    for (let i = days.length - 1; i > 0; i--) {
      if (daysBetween(days[i - 1], days[i]) === 1) streak++;
      else break;
    }
    return streak;
  }

  return {
    parseNum, fmt, fmtAED, fmtPct,
    riskAmount, positionSize, recoveryNeededPct, crv, rMultiple,
    feeRoundTrip, expectancy, balanceAfterLosses,
    gradeQuestion, gradeQuiz, phaseStatus,
    REVIEW_INTERVALS, nextReview, dueReviews,
    daysBetween, computeStreak
  };
})();
if (typeof module !== 'undefined' && module.exports) module.exports = ENGINE;

/* ============================================================
   DATA — Curriculum, Lektionen, Prüfungen, Glossar.
   Reine Daten, keine Logik. Sprache: einfaches Deutsch.
   ============================================================ */
const DATA = {

  meta: { appVersion: '1.0.0', build: '2026-07-16' },

  // ---------- 20 Phasen (identisch mit 04_Tracker/progress.json) ----------
  phases: [
    { id: 0,  title: 'Orientierung',                        lessonsTotal: 10 },
    { id: 1,  title: 'Börsengrundlagen',                    lessonsTotal: 19 },
    { id: 2,  title: 'Orders und Ausführung',               lessonsTotal: 13 },
    { id: 3,  title: 'Risiko und Mathematik',               lessonsTotal: 18 },
    { id: 4,  title: 'Chart-Grundlagen',                    lessonsTotal: 11 },
    { id: 5,  title: 'Trend und Marktstruktur',             lessonsTotal: 14 },
    { id: 6,  title: 'Unterstützungen, Widerstände, Zonen', lessonsTotal: 11 },
    { id: 7,  title: 'Volumen und Volatilität',             lessonsTotal: 9  },
    { id: 8,  title: 'Indikatoren',                         lessonsTotal: 14 },
    { id: 9,  title: 'Umstrittene Trading-Konzepte',        lessonsTotal: 10 },
    { id: 10, title: 'Fundamentalanalyse',                  lessonsTotal: 24 },
    { id: 11, title: 'Unternehmensrecherche',               lessonsTotal: 19 },
    { id: 12, title: 'Makroökonomie',                       lessonsTotal: 16 },
    { id: 13, title: 'Nachrichten und Ereignisse',          lessonsTotal: 15 },
    { id: 14, title: 'Strategien',                          lessonsTotal: 13 },
    { id: 15, title: 'Trade Management',                    lessonsTotal: 16 },
    { id: 16, title: 'Psychologie und Verhalten',           lessonsTotal: 20 },
    { id: 17, title: 'Backtesting',                         lessonsTotal: 19 },
    { id: 18, title: 'Paper Trading',                       lessonsTotal: 10 },

/* ============================================================
   STORE — Laden/Speichern (localStorage), Export/Import, Reset.
   ============================================================ */
const STORE = (() => {
  const KEY = 'ta_state_v1';

  function defaultState() {
    return {
      version: 1,
      profile: { name: '', contractAccepted: false, createdAt: null },
      settings: { capitalAED: 1000, riskPerTradePct: 0.5, feePerOrderAED: 5 },
      progress: {
        currentPhase: 0,
        currentLesson: '0.1',
        lessons: {},   // lessonId -> {status,score,attempts,completedAt}
        exams: {},     // examId  -> {passed,score,attempts,completedAt}
        phases: { '0': { status: 'current' } }
      },
      reviews: [],     // {questionId, lessonId, intervalIdx, dueDate}
      learningDays: [],
      log: []
    };
  }

  let state = null;
  let storageOk = true;

  function load() {
    try {
      const raw = localStorage.getItem(KEY);
      state = raw ? migrate(JSON.parse(raw)) : defaultState();
    } catch (e) {
      storageOk = false;
      state = defaultState();
    }
    return state;
  }

  function isObj(x) { return x != null && typeof x === 'object' && !Array.isArray(x); }

  function migrate(s) {
    // Whitelist + Typprüfung: fremde/kaputte Felder dürfen den State nie zerstören.
    const d = defaultState();
    if (!isObj(s)) return d;
    const prog = isObj(s.progress) ? s.progress : {};
    return {
      version: 1,
      profile: { ...d.profile, ...(isObj(s.profile) ? s.profile : {}) },
      settings: { ...d.settings, ...(isObj(s.settings) ? s.settings : {}) },
      progress: {
        currentPhase: typeof prog.currentPhase === 'number' ? prog.currentPhase : 0,
        currentLesson: typeof prog.currentLesson === 'string' ? prog.currentLesson : '0.1',
        lessons: isObj(prog.lessons) ? prog.lessons : {},
        exams: isObj(prog.exams) ? prog.exams : {},
        phases: isObj(prog.phases) ? prog.phases : d.progress.phases
      },
      reviews: Array.isArray(s.reviews) ? s.reviews.filter(isObj) : [],
      learningDays: Array.isArray(s.learningDays) ? s.learningDays.filter(x => typeof x === 'string') : [],
      log: Array.isArray(s.log) ? s.log.filter(isObj) : []
    };
  }

  function save() {
    try {
      localStorage.setItem(KEY, JSON.stringify(state));
      storageOk = true;
    } catch (e) { storageOk = false; }
  }

  function get() { return state || load(); }

  function todayISO() {
    // Lokales Datum des Geräts (Dubai beim Nutzer)
    const d = new Date();
    const off = d.getTimezoneOffset();
    return new Date(d.getTime() - off * 60000).toISOString().slice(0, 10);
  }

  function markLearningToday() {
    const t = todayISO();
    if (!state.learningDays.includes(t)) { state.learningDays.push(t); state.learningDays.sort(); }
  }

  function logEvent(type, detail) {
    state.log.push({ date: new Date().toISOString(), type, detail });
    if (state.log.length > 500) state.log = state.log.slice(-500);
  }

  function exportJSON() {
    return JSON.stringify({ exportedAt: new Date().toISOString(), app: 'trading-academy', ...state }, null, 2);
  }

  function importJSON(text) {
    const obj = JSON.parse(text); // wirft bei ungültigem JSON
    if (!obj || typeof obj !== 'object' || !obj.progress) throw new Error('Keine gültige Trading-Academy-Exportdatei.');
    state = migrate(obj);
    save();
    return state;
  }

  function reset() {
    state = defaultState();
    try { localStorage.removeItem(KEY); } catch (e) {}
    save();
    return state;
  }

  return { load, save, get, defaultState, todayISO, markLearningToday, logEvent, exportJSON, importJSON, reset,
           get storageOk() { return storageOk; } };
})();
if (typeof module !== 'undefined' && module.exports) module.exports = STORE;

(() => {
  const $ = sel => document.querySelector(sel);

  // ---------- Hilfen ----------
  function esc(s) {
    return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  // ---------- Router (zustandsbasiert, Hash nur als Komfort) ----------
  let CURRENT = 'heute';
  function parseHash() {
    try { return (location.hash || '').replace(/^#\//, '') || null; } catch (e) { return null; }
  }
  function go(route) {
    CURRENT = route || 'heute';
    try { history.replaceState(null, '', '#/' + CURRENT); } catch (e) { /* Sandbox: egal */ }
    render();
  }
  // Ein Klick auf irgendein Element mit data-route navigiert — ohne echte Browser-Navigation.
  document.addEventListener('click', ev => {
    const t = ev.target.closest('[data-route]');
    if (t) { ev.preventDefault(); go(t.dataset.route); }
  });
  window.addEventListener('hashchange', () => {
    const h = parseHash();
    if (h && h !== CURRENT) { CURRENT = h; render(); }
  });

  // Auswertung an Button-Klick UND Formular-Submit binden — funktioniert
  // auch in Sandbox-Umgebungen, die Submits blockieren.
  function bindEval(form, fn) {

      fn();
      const r = form.querySelector('.quiz-result');
      if (r && r.innerHTML.trim()) r.scrollIntoView({ behavior: 'smooth', block: 'center' });
    };

        <p class="muted">Deine persönliche Ausbildung — Schritt für Schritt, ehrlich, ohne Gewinnversprechen.</p>
        <label class="calc-field"><span>Wie soll ich dich nennen?</span><input type="text" id="ob-name" placeholder="Vorname" maxlength="40"></label>
        <h2>Dein Lernvertrag</h2>
        <p class="muted small">Diese Regeln schützen dein Kapital. Bitte lies jede einzeln und bestätige sie.</p>
        ${items}
        <button class="btn primary" id="ob-go" type="button" disabled>Ausbildung starten</button>
        <div id="ob-hint" class="muted small" aria-live="polite"></div>
      </div>
    </div>`;
    const boxes = [...document.querySelectorAll('[data-ci]')];
    const name = $('#ob-name'), btn = $('#ob-go'), hint = $('#ob-hint');
    const check = () => {
      const open = [];
      if (!name.value.trim()) open.push('Name eintragen');
      const missing = boxes.filter(b => !b.checked).length;
      if (missing) open.push(missing + (missing === 1 ? ' Regel bestätigen' : ' Regeln bestätigen'));
      btn.disabled = open.length > 0;
      hint.textContent = open.length ? 'Noch offen: ' + open.join(' · ') : 'Alles bereit — los geht’s!';
    };
    boxes.forEach(b => b.addEventListener('change', check));
    name.addEventListener('input', check);
    check();
    btn.addEventListener('click', () => {
      const s = STORE.get();
      s.profile.name = name.value.trim();
      s.profile.contractAccepted = true;
      s.profile.createdAt = new Date().toISOString();
      STORE.logEvent('profile_created', s.profile.name);
      STORE.save();
      go('heute');
    });
  }

  // ---------- Ansicht: Heute ----------
  function viewHeute() {
    const s = STORE.get();
    const today = STORE.todayISO();
    const streak = E.computeStreak(s.learningDays, today);
    const due = E.dueReviews(s.reviews, today).filter(r => findQuestion(r.questionId));
    const next = nextOpenLesson();
    const doneCount = Object.values(s.progress.lessons).filter(l => l.status === 'done').length;

    shell('heute', `
      <h1>Hallo ${esc(s.profile.name)} 👋</h1>
      <p class="muted">Eine Lektion dauert 10–20 Minuten — ideal für dein Lernfenster am Abend.</p>
      <div class="cards">
        <div class="card stat"><div class="stat-num">${streak}</div><div class="stat-label">Lern-Streak (Tage)</div></div>
        <div class="card stat"><div class="stat-num">${s.learningDays.length}</div><div class="stat-label">Lerntage gesamt</div></div>
        <div class="card stat"><div class="stat-num">${doneCount}</div><div class="stat-label">Lektionen bestanden</div></div>
        <div class="card stat"><div class="stat-num">${due.length}</div><div class="stat-label">Wiederholungen fällig</div></div>
      </div>
      ${due.length ? `<div class="card next-card">
        <div class="card-kicker">Zuerst: kurze Wiederholung (${due.length})</div>
        <p class="muted">Wiederholen festigt mehr als Neues lernen — dauert nur 2–3 Minuten.</p>
        ${navBtn('wiederholen', 'btn primary', 'Wiederholung starten')}
      </div>` : ''}
      ${next ? `<div class="card ${due.length ? '' : 'next-card'}">
        <div class="card-kicker">Dein nächster Schritt</div>
        <h2>${next.type === 'exam' ? '📝 ' : '📚 '}${esc(stepTitle(next))}</h2>
        <p class="muted">${next.type === 'exam' ? 'Abschlussprüfung des Risikomoduls — ≥ 80 % und alle 🛡️-Fragen korrekt.' : 'Empfohlene nächste Lerneinheit.'}</p>
        ${navBtn(stepRoute(next), 'btn primary', 'Jetzt starten')}
      </div>` : `<div class="card next-card"><h2>🎓 Alle aktuellen Inhalte abgeschlossen!</h2>
        <p class="muted">Stark! Sag deinem Coach (Claude) Bescheid — er schaltet die nächsten Lektionen frei und überträgt deinen Stand in den Tracker. Bis dahin: Wiederholungen machen oder im Glossar stöbern.</p>
        ${navBtn('fortschritt', 'btn', 'Fortschritt ansehen')}</div>`}
      <div class="card muted-card"><b>Erinnerung:</b> Belohnt werden Geduld, eingehaltene Regeln und saubere Dokumentation — nie die Anzahl von Trades. Nicht zu handeln ist eine vollwertige Entscheidung.</div>
    `);
  }

  // ---------- Ansicht: Lernpfad ----------
  function viewLernpfad() {
    const s = STORE.get();
    const rDone = moduleRDoneCount(), rTotal = DATA.moduleR.lessons.length;
    const rLessons = DATA.moduleR.lessons.map((id, idx) => {
      const l = DATA.lessons[id];
      const done = isDone(id);
      const prevDone = idx === 0 || isDone(DATA.moduleR.lessons[idx - 1]);
      const locked = !done && !prevDone;
      return lessonRow(id, l.title, done, locked, 'lektion/' + id, lessonState(id));
    }).join('');
    const examRow = (() => {
      const allDone = rDone === rTotal;
      const passed = examRPassed();
      const ex = s.progress.exams['R-EXAM'];
      return lessonRow('R-EXAM', DATA.examR.title, passed, !allDone && !passed, 'pruefung/R-EXAM', ex, true);
    })();

    const phasesHtml = DATA.phases.map(ph => {
      let status, doneCnt = 0;
      if (ph.id === 0) {
        doneCnt = phase0DoneCount();
        status = doneCnt >= DATA.phase0Lessons.length ? 'done' : 'current';
      } else {
        status = E.phaseStatus(ph.id, s.progress);
      }
      const badge = status === 'done' ? '✅' : status === 'current' ? '🔓' : '🔒';
      let inner = '';
      if (ph.id === 0) {
        inner = DATA.phase0Lessons.map((l, idx) => {
          const done = isDone(l.id);
          const hasContent = !!DATA.lessons[l.id];
          const prevDone = idx === 0 || isDone(DATA.phase0Lessons[idx - 1].id);
          if (hasContent) return lessonRow(l.id, l.title, done, !done && !prevDone, 'lektion/' + l.id, lessonState(l.id));
          return `<div class="lesson-row planned"><span class="lr-badge">•</span><span class="lr-title">${esc(l.id)} — ${esc(l.title)}</span><span class="lr-meta">Inhalt folgt — mit dem Coach lernbar</span></div>`;
        }).join('');
      } else {
        inner = `<div class="phase-locked-note">Wird freigeschaltet, wenn Phase ${ph.id - 1} mit ≥ 80 % und ohne schwere Risikofehler abgeschlossen ist. ${ph.lessonsTotal} Lektionen geplant.</div>`;
      }
      return `<details class="phase" ${ph.id === 0 ? 'open' : ''} ${status === 'locked' ? 'data-locked="1"' : ''}>
        <summary><span class="ph-badge">${badge}</span><span class="ph-title">Phase ${ph.id}: ${esc(ph.title)}</span>
        <span class="ph-meta">${ph.id === 0 ? doneCnt + ' / ' + DATA.phase0Lessons.length : '0 / ' + ph.lessonsTotal}</span></summary>
        <div class="phase-body">${inner}</div>
      </details>`;
    }).join('');

    shell('lernpfad', `
      <h1>Lernpfad</h1>
      <p class="muted">Du siehst den ganzen Weg — freigeschaltet wird Schritt für Schritt, durch nachgewiesenes Verständnis.</p>
      <div class="card module-r ${moduleRComplete() ? 'complete' : ''}">
        <div class="card-kicker">Pflichtmodul · von Anfang an offen</div>
        <h2>🛡️ ${esc(DATA.moduleR.title)}</h2>
        <p class="muted">${esc(DATA.moduleR.subtitle)} Fortschritt: ${rDone} / ${rTotal} Lektionen ${examRPassed() ? '· Prüfung bestanden ✅' : ''}</p>
        <div class="lesson-list">${rLessons}${examRow}</div>
      </div>
      <h2 class="section-h">Die 20 Phasen</h2>
      ${phasesHtml}
    `);
  }

  function lessonRow(id, title, done, locked, route, st, isExam) {
    const badge = done ? '✅' : locked ? '🔒' : '▶️';
    const meta = done && st ? `bestanden · ${Math.round(st.score)} %` : locked ? 'erst Vorherige abschließen' : (isExam ? 'Prüfung' : 'offen');
    if (locked) return `<div class="lesson-row locked"><span class="lr-badge">${badge}</span><span class="lr-title">${esc(id)} — ${esc(title)}</span><span class="lr-meta">${meta}</span></div>`;
    return navLink(route, 'lesson-row ' + (done ? 'done' : ''), `<span class="lr-badge">${badge}</span><span class="lr-title">${esc(id)} — ${esc(title)}</span><span class="lr-meta">${meta}</span>`);
  }

  // ---------- Lektion rendern ----------
  function blockHtml(b) {
    if (b.p) return `<p>${b.p}</p>`;
    if (b.h) return `<h3>${esc(b.h)}</h3>`;
    if (b.list) return `<ul>${b.list.map(i => `<li>${i}</li>`).join('')}</ul>`;
    if (b.note) return `<div class="note">💡 ${b.note}</div>`;
    if (b.warn) return `<div class="warnbox">⚠️ ${b.warn}</div>`;
    if (b.svg) return `<div class="figure">${SVGS[b.svg] || ''}</div>`;
    if (b.calc) return calcWidget(b.calc);
    if (b.table) {
      const t = b.table;
      return `<div class="tablewrap"><table>${t.caption ? `<caption>${esc(t.caption)}</caption>` : ''}
        <thead><tr>${t.head.map(h => `<th>${esc(h)}</th>`).join('')}</tr></thead>
        <tbody>${t.rows.map(r => `<tr>${r.map(c => `<td>${esc(c)}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`;
    }
    return '';
  }

  const RC_BADGE = ' <span class="rc" role="img" aria-label="risikokritische Frage — muss korrekt sein" title="risikokritisch — muss korrekt sein">🛡️</span>';

  function questionHtml(q, idx) {
    if (q.type === 'mc') {
      return `<fieldset class="q" data-qid="${q.id}"><legend>${idx + 1}. ${esc(q.q)}${q.riskCritical ? RC_BADGE : ''}</legend>
        ${q.options.map((o, i) => `<label class="q-opt"><input type="radio" name="${q.id}" value="${i}"> <span>${esc(o)}</span></label>`).join('')}
        <div class="q-fb"></div></fieldset>`;
    }
    return `<fieldset class="q" data-qid="${q.id}"><legend>${idx + 1}. ${esc(q.q)}${q.riskCritical ? RC_BADGE : ''}</legend>
      <input type="text" inputmode="decimal" class="q-num" name="${q.id}" placeholder="Zahl, z. B. 12,5">
      <div class="q-fb"></div></fieldset>`;
  }

  function collectAnswers(root, questions) {
    const answers = {};
    for (const q of questions) {
      if (q.type === 'mc') {
        const sel = root.querySelector(`input[name="${q.id}"]:checked`);
        answers[q.id] = sel ? sel.value : null;
      } else {
        const inp = root.querySelector(`input[name="${q.id}"]`);
        answers[q.id] = inp ? inp.value : null;
      }
    }
    return answers;
  }

  // Unbeantwortete Fragen markieren; true, wenn alles beantwortet ist.
  function checkAnswered(form, questions, answers) {
    const open = [];
    questions.forEach((q, i) => {
      const box = form.querySelector(`[data-qid="${q.id}"]`);
      const empty = answers[q.id] == null || answers[q.id] === '';
      box.classList.toggle('unanswered', empty);
      if (empty) { open.push(i + 1); box.querySelector('.q-fb').innerHTML = '<span class="fb-open">Bitte beantworten.</span>'; }
      else if (box.querySelector('.q-fb .fb-open')) box.querySelector('.q-fb').innerHTML = '';
    });
    if (open.length) {
      form.querySelector('.quiz-result').innerHTML = `<div class="card warn-card">Bitte beantworte noch die Frage${open.length > 1 ? 'n' : ''} <b>${open.join(', ')}</b>.</div>`;
      const first = form.querySelector('.q.unanswered');
      if (first) first.scrollIntoView({ behavior: 'smooth', block: 'center' });
      return false;
    }
    return true;
  }

  function showFeedback(root, questions, answers, result) {
    for (const q of questions) {
      const box = root.querySelector(`[data-qid="${q.id}"]`);
      const fb = box.querySelector('.q-fb');
      const ok = !result.wrong.includes(q.id);
      box.classList.remove('ok', 'bad', 'unanswered');
      box.classList.add(ok ? 'ok' : 'bad');
      if (ok) fb.innerHTML = `<span class="fb-ok">✔️ Richtig.</span> ${esc(q.explain || '')}`;
      else {
        let corr = q.type === 'mc' ? `Richtige Antwort: „${esc(q.options[q.correct])}"` : `Richtige Antwort: ${E.fmt(q.correct, 2)}`;
        fb.innerHTML = `<span class="fb-bad">✘ Noch nicht.</span> ${corr}. ${esc(q.explain || '')}${q.riskCritical ? '<br><b>🛡️ Risikokritisch — diese Frage muss für die Freischaltung korrekt sein.</b>' : ''}`;
      }
    }
  }

  function wrongNumbers(questions, result) {
    return questions.map((q, i) => result.wrong.includes(q.id) ? i + 1 : null).filter(Boolean);
  }

  function addRetryButton(form, questions) {
    const box = form.querySelector('.quiz-result .warn-card');
    if (!box || box.querySelector('.js-retry')) return;
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'btn js-retry';
    btn.textContent = '🔁 Neu starten (Antworten leeren)';
    btn.addEventListener('click', () => {
      try { form.reset(); } catch (e) {}
      form.querySelectorAll('.q').forEach(qq => { qq.classList.remove('ok', 'bad', 'unanswered'); qq.querySelector('.q-fb').innerHTML = ''; });
      form.querySelector('.quiz-result').innerHTML = '';
      const first = form.querySelector('.q');
      if (first) first.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
    box.appendChild(document.createElement('br'));
    box.appendChild(btn);
  }

  function viewLektion(id) {
    const l = DATA.lessons[id];
    if (!l) {
      const planned = DATA.phase0Lessons.find(x => x.id === id);
      shell('lernpfad', `${navLink('lernpfad', 'back', '← Lernpfad')}<h1>${esc(id)} — ${esc(planned ? planned.title : 'Lektion')}</h1>
        <div class="card"><p>Diese Lektion wird in der nächsten Ausbaustufe der App ergänzt. Du kannst sie schon jetzt <b>mit deinem Coach</b> (Claude) lernen — der Fortschritt wird dann im Tracker vermerkt.</p>${navBtn('lernpfad', 'btn', 'Zurück zum Lernpfad')}</div>`);
      return;
    }
    const done = isDone(id);
    const terms = l.terms.map(t => `<details class="term" open><summary>${esc(t.term)}</summary><p>${esc(t.def)}</p></details>`).join('');
    const content = l.content.map(blockHtml).join('');
    const deep = (l.deep || []).map(d => `<details class="deep"><summary>${esc(d.label)}</summary><p>${esc(d.text)}</p></details>`).join('');

    let exerciseHtml = '';
    if (l.exercise) {
      if (l.exercise.items) {
        exerciseHtml = `<h2>✏️ Übung</h2><p class="muted">${esc(l.exercise.intro)}</p>` + l.exercise.items.map((it, i) => `
          <div class="ex-item" data-exi="${i}">
            <p>${esc(it.text)}</p>
            <div class="ex-opts">${it.options.map((o, oi) => `<button type="button" class="btn chip" data-oi="${oi}">${esc(o)}</button>`).join('')}</div>
            <div class="q-fb"></div>
          </div>`).join('');
      } else if (l.exercise.calc) {
        exerciseHtml = `<h2>✏️ Übung</h2><p class="muted">${esc(l.exercise.intro)}</p>
          <form class="ex-calc">${l.exercise.calc.map((q, i) => questionHtml(q, i)).join('')}
          <button class="btn js-eval" type="button">Übung prüfen</button><div class="quiz-result" role="status" aria-live="polite"></div></form>`;
      }
    }

    // „Weiter"-Ziel für die Zusammenfassung (Duolingo-Prinzip: immer genau ein nächster Schritt)
    const next = nextOpenLesson();
    const nextIsThis = next && next.type === 'lesson' && next.id === id;
    const afterThis = nextIsThis ? (() => {
      // Was käme nach Bestehen DIESER Lektion?
      if (id === '0.1') return { label: 'Weiter zu R1 — Was bedeutet Risiko? →', route: 'lektion/R1' };
      const ridx = DATA.moduleR.lessons.indexOf(id);
      if (ridx >= 0 && ridx < DATA.moduleR.lessons.length - 1) {
        const nid = DATA.moduleR.lessons[ridx + 1];
        return { label: `Weiter zu ${nid} — ${DATA.lessons[nid].title} →`, route: 'lektion/' + nid };
      }
      if (ridx === DATA.moduleR.lessons.length - 1) return { label: 'Weiter zur Abschlussprüfung →', route: 'pruefung/R-EXAM' };
      return { label: 'Weiter im Lernpfad →', route: 'lernpfad' };
    })() : (next ? { label: `Weiter: ${stepTitle(next)} →`, route: stepRoute(next) } : { label: 'Zum Lernpfad →', route: 'lernpfad' });

    shell('lernpfad', `
      ${navLink('lernpfad', 'back', '← Lernpfad')}
      <div class="lesson-head">
        <h1>${esc(l.id)} — ${esc(l.title)}</h1>
        <span class="pill">${esc(l.duration)}</span>${done ? '<span class="pill done-pill">✅ bestanden</span>' : ''}
      </div>
      <div class="card goal"><b>🎯 Lernziel:</b> ${esc(l.goal)}</div>
      <h2>Kernbegriffe (${l.terms.length})</h2>
      <div class="terms">${terms}</div>
      <div class="lesson-content">${content}</div>
      ${deep ? `<h2>Vertiefung (freiwillig)</h2>${deep}` : ''}
      ${exerciseHtml}
      <h2>📝 Wissenstest</h2>
      <p class="muted">Bestanden ab 80 % — Fragen mit 🛡️ (risikokritisch) müssen korrekt sein. Du kannst beliebig oft wiederholen.</p>
      <form class="quiz">${l.quiz.map((q, i) => questionHtml(q, i)).join('')}
        <button class="btn primary js-eval" type="button">Test auswerten</button>
        <div class="quiz-result" role="status" aria-live="polite"></div>
      </form>
      <div class="summary-box" style="display:${done ? 'block' : 'none'}">
        <h2>Zusammenfassung in 5 Sätzen</h2>
        <ol>${l.summary.map(x => `<li>${esc(x)}</li>`).join('')}</ol>
        ${navBtn(afterThis.route, 'btn primary', afterThis.label)}
      </div>
    `);

    const main = $('.main');
    wireCalcs(main);

    // Zuordnungs-Übung
    main.querySelectorAll('.ex-item').forEach(box => {
      const it = l.exercise.items[Number(box.dataset.exi)];
      box.querySelectorAll('.chip').forEach(btn => btn.addEventListener('click', (ev) => {
        ev.preventDefault();
        const pick = Number(btn.dataset.oi);
        const fb = box.querySelector('.q-fb');
        box.querySelectorAll('.chip').forEach(b => b.classList.remove('sel-ok', 'sel-bad'));
        if (pick === it.correct) { btn.classList.add('sel-ok'); fb.innerHTML = `<span class="fb-ok">✔️ Richtig.</span> ${esc(it.explain)}`; }
        else { btn.classList.add('sel-bad'); fb.innerHTML = `<span class="fb-bad">✘ Noch nicht.</span> ${esc(it.explain)}`; }
      }));
    });

    // Rechen-Übung
    const exForm = main.querySelector('.ex-calc');
    if (exForm) bindEval(exForm, () => {
      const qs = l.exercise.calc;
      const answers = collectAnswers(exForm, qs);
      const res = E.gradeQuiz(qs, answers);
      showFeedback(exForm, qs, answers, res);
      exForm.querySelector('.quiz-result').innerHTML = `<div class="card ${res.wrong.length ? 'warn-card' : 'ok-card'}">Übung: ${res.earned} von ${res.total} richtig.${res.wrong.length ? ' Schau dir die Erklärungen an und probiere es nochmal — die Übung zählt nicht für die Freischaltung.' : ' Sehr gut!'}</div>`;
    });

    // Wissenstest
    const form = main.querySelector('.quiz');
    bindEval(form, () => {
      const answers = collectAnswers(form, l.quiz);
      if (!checkAnswered(form, l.quiz, answers)) return;
      const res = E.gradeQuiz(l.quiz, answers);
      showFeedback(form, l.quiz, answers, res);
      onQuizGraded(id, l, res, form);
    });
  }

  function onQuizGraded(id, l, res, form) {
    const s = STORE.get();
    const prev = s.progress.lessons[id] || { attempts: 0 };
    const wasDone = prev.status === 'done';
    const today = STORE.todayISO();
    STORE.markLearningToday();

    if (res.passed || wasDone) {
      // Bestanden bleibt bestanden — ein schwächerer Wiederholungsversuch nimmt nichts weg.
      s.progress.lessons[id] = {
        status: 'done',
        score: Math.max(res.passed ? res.scorePct : 0, prev.score || 0),
        attempts: (prev.attempts || 0) + 1,
        completedAt: prev.completedAt || new Date().toISOString()
      };
      if (res.passed) {
        const pick = l.quiz.filter(q => q.riskCritical || res.wrong.includes(q.id)).slice(0, 4);
        for (const q of pick) {
          if (!s.reviews.find(r => r.questionId === q.id)) {
            const nr = E.nextReview(-1, true, today);
            s.reviews.push({ questionId: q.id, lessonId: id, intervalIdx: nr.intervalIdx, dueDate: nr.dueDate });
          }
        }
      }
      // Phase 0 als abgeschlossen persistieren, falls komplett
      if (DATA.phase0Lessons.every(x => x.id === id || isDone(x.id)) && DATA.phase0Lessons.every(x => !!DATA.lessons[x.id] ? true : false)) {
        s.progress.phases['0'] = { status: 'done' };
      }
      const next = nextOpenLesson();
      if (next && next.type === 'lesson') s.progress.currentLesson = next.id;
      STORE.logEvent(res.passed ? 'lesson_passed' : 'lesson_repeat', `${id} mit ${Math.round(res.scorePct)} %`);
      STORE.save();
      const msg = res.passed
        ? `<b>🎉 Bestanden mit ${Math.round(res.scorePct)} %!</b> Lies unten die Zusammenfassung — sie ist Teil der Lektion.`
        : `<b>Diese Lektion bleibt bestanden</b> (beste Punktzahl ${Math.round(s.progress.lessons[id].score)} %). Heute waren es ${Math.round(res.scorePct)} % — schau dir die Erklärungen an.`;
      form.querySelector('.quiz-result').innerHTML = `<div class="card ok-card">${msg}</div>`;
      const sum = $('.summary-box'); sum.style.display = 'block';
      sum.scrollIntoView({ behavior: 'smooth' });
    } else {
      s.progress.lessons[id] = { status: 'attempted', score: Math.max(res.scorePct, prev.score || 0), attempts: (prev.attempts || 0) + 1 };
      STORE.logEvent('lesson_failed', `${id} mit ${Math.round(res.scorePct)} %`);
      STORE.save();
      const nums = wrongNumbers(l.quiz, res);
      const reason = res.riskCriticalFailed.length
        ? `Eine risikokritische Frage (🛡️) war falsch — sie muss sitzen, bevor es weitergeht.`
        : `Du brauchst mindestens 80 % (aktuell ${Math.round(res.scorePct)} %).`;
      form.querySelector('.quiz-result').innerHTML = `<div class="card warn-card"><b>Noch nicht bestanden.</b> ${reason}<br>Schau dir die Erklärungen bei Frage ${nums.join(', ')} an und versuche es direkt nochmal — ohne Wartezeit, ohne Abzug.</div>`;
      addRetryButton(form, l.quiz);
    }
  }

  // ---------- Ansicht: Prüfung Modul R ----------
  function viewPruefung(examId) {
    if (examId !== 'R-EXAM') { go('lernpfad'); return; }
    const exam = DATA.examR;
    const s = STORE.get();
    const allDone = moduleRDoneCount() === DATA.moduleR.lessons.length;
    const ex = s.progress.exams['R-EXAM'];

    if (!allDone && !examRPassed()) {
      shell('lernpfad', `${navLink('lernpfad', 'back', '← Lernpfad')}<h1>${esc(exam.title)}</h1>
        <div class="card warn-card">🔒 Erst alle 5 Lektionen des Moduls abschließen — dann öffnet sich die Prüfung.</div>
        ${navBtn('lernpfad', 'btn', 'Zum Lernpfad')}`);
      return;
    }

    // Bereits bestanden: Ergebnis-Karte statt leerer Prüfung
    if (examRPassed() && !viewPruefung._retake) {
      const when = ex.completedAt ? new Date(ex.completedAt).toLocaleDateString('de-DE') : '';
      shell('lernpfad', `${navLink('lernpfad', 'back', '← Lernpfad')}
        <h1>📝 ${esc(exam.title)}</h1>
        <div class="card ok-card"><b>✅ Bestanden${when ? ' am ' + when : ''} mit ${Math.round(ex.score)} %</b> (${ex.attempts} Versuch${ex.attempts > 1 ? 'e' : ''}).<br>
        Das Modul ist abgeschlossen — dein Fundament steht.</div>
        ${navBtn('heute', 'btn primary', 'Weiter zum nächsten Schritt →')}
        <button class="btn" type="button" id="btn-retake">Prüfung freiwillig wiederholen</button>`);
      $('#btn-retake').addEventListener('click', () => { viewPruefung._retake = true; render(); });
      return;
    }
    viewPruefung._retake = false;

    const lastLine = ex && !ex.passed ? `<p class="muted small">Letzter Versuch: ${Math.round(ex.score)} % · ${ex.attempts} Versuch${ex.attempts > 1 ? 'e' : ''} — Wiederholen kostet nichts.</p>` : '';

    shell('lernpfad', `
      ${navLink('lernpfad', 'back', '← Lernpfad')}
      <h1>📝 ${esc(exam.title)}</h1>
      <div class="card goal">${esc(exam.intro)}</div>
      ${lastLine}
      <form class="quiz">${exam.questions.map((q, i) => questionHtml(q, i)).join('')}
        <div class="exam-progress muted" aria-live="polite">0 von ${exam.questions.length} beantwortet</div>
        <button class="btn primary js-eval" type="button">Prüfung auswerten</button>
        <div class="quiz-result" role="status" aria-live="polite"></div>
      </form>
    `);
    const form = $('.quiz');

    // Live-Zähler
    const counter = form.querySelector('.exam-progress');
    const updateCounter = () => {
      const a = collectAnswers(form, exam.questions);
      const n = exam.questions.filter(q => a[q.id] != null && a[q.id] !== '').length;
      counter.textContent = `${n} von ${exam.questions.length} beantwortet`;
    };
    form.addEventListener('change', updateCounter);
    form.addEventListener('input', updateCounter);

    bindEval(form, () => {
      const answers = collectAnswers(form, exam.questions);
      if (!checkAnswered(form, exam.questions, answers)) return;
      const res = E.gradeQuiz(exam.questions, answers);
      showFeedback(form, exam.questions, answers, res);
      const s2 = STORE.get();
      const prev = s2.progress.exams['R-EXAM'] || { attempts: 0 };
      const wasPassed = !!prev.passed;
      STORE.markLearningToday();
      if (res.passed || wasPassed) {
        s2.progress.exams['R-EXAM'] = {
          passed: true,
          score: Math.max(res.passed ? res.scorePct : 0, prev.score || 0),
          attempts: (prev.attempts || 0) + 1,
          completedAt: prev.completedAt || new Date().toISOString()
        };
        STORE.logEvent('exam_passed', `R-EXAM mit ${Math.round(res.scorePct)} %`);
        STORE.save();
        form.querySelector('.quiz-result').innerHTML = `<div class="card ok-card"><b>🎉 Prüfung bestanden mit ${Math.round(res.scorePct)} %!</b><br>
          Das Modul „Risiko, Verlust und Positionsgröße" ist abgeschlossen — das Fundament steht. Dein Coach überträgt das Ergebnis in den Tracker.</div>
          <div style="margin-top:10px">${navBtn('heute', 'btn primary', 'Weiter zum nächsten Schritt →')}</div>`;
      } else {
        s2.progress.exams['R-EXAM'] = { passed: false, score: Math.max(res.scorePct, prev.score || 0), attempts: (prev.attempts || 0) + 1 };
        STORE.logEvent('exam_failed', `R-EXAM mit ${Math.round(res.scorePct)} %`);
        STORE.save();
        const nums = wrongNumbers(exam.questions, res);
        const reason = res.riskCriticalFailed.length ? 'Mindestens eine risikokritische Frage (🛡️) war falsch.' : `Du brauchst mindestens 80 % (aktuell ${Math.round(res.scorePct)} %).`;
        form.querySelector('.quiz-result').innerHTML = `<div class="card warn-card"><b>Noch nicht bestanden.</b> ${reason} Schau dir Frage ${nums.join(', ')} an, wiederhole bei Bedarf die passende Lektion und versuche es erneut — so oft du willst.</div>`;
        addRetryButton(form, exam.questions);
      }
    });
  }

  // ---------- Ansicht: Wiederholen ----------
  function findQuestion(qid) {
    for (const lid of Object.keys(DATA.lessons)) {
      const q = DATA.lessons[lid].quiz.find(x => x.id === qid);
      if (q) return q;
    }
    return DATA.examR.questions.find(x => x.id === qid) || null;
  }

  function viewWiederholen() {
    const s = STORE.get();
    // Verwaiste Einträge (Frage existiert nicht mehr) entfernen
    const before = s.reviews.length;
    s.reviews = s.reviews.filter(r => findQuestion(r.questionId));
    if (s.reviews.length !== before) STORE.save();

    const today = STORE.todayISO();
    const due = E.dueReviews(s.reviews, today);
    if (!due.length) {
      shell('heute', `${navLink('heute', 'back', '← Heute')}<h1>Wiederholung</h1><div class="card ok-card">Nichts fällig. 👍 Wiederholungen erscheinen hier 1, 3, 7 und 21 Tage nach einer bestandenen Lektion.</div>${navBtn('heute', 'btn', 'Zurück')}`);
      return;
    }
    const qs = due.map(r => findQuestion(r.questionId));
    shell('heute', `
      ${navLink('heute', 'back', '← Heute')}
      <h1>Wiederholung (${qs.length})</h1>
      <p class="muted">Kurz und knackig — richtig beantwortete Fragen kommen in größeren Abständen wieder.</p>
      <form class="quiz">${qs.map((q, i) => questionHtml(q, i)).join('')}
        <button class="btn primary js-eval" type="button">Auswerten</button>
        <div class="quiz-result" role="status" aria-live="polite"></div>
      </form>
    `);
    const form = $('.quiz');
    bindEval(form, () => {
      const answers = collectAnswers(form, qs);
      if (!checkAnswered(form, qs, answers)) return;
      const res = E.gradeQuiz(qs, answers);
      showFeedback(form, qs, answers, res);
      STORE.markLearningToday();
      for (const r of due) {
        const ok = !res.wrong.includes(r.questionId);
        const nr = E.nextReview(ok ? r.intervalIdx : -1, ok, today);
        r.intervalIdx = nr.intervalIdx; r.dueDate = nr.dueDate;
      }
      STORE.logEvent('review_done', `${qs.length - res.wrong.length}/${qs.length} richtig`);
      STORE.save();
      form.querySelector('.quiz-result').innerHTML = `<div class="card ${res.wrong.length ? 'warn-card' : 'ok-card'}">${qs.length - res.wrong.length} von ${qs.length} richtig. ${res.wrong.length ? 'Falsche Fragen kommen morgen wieder.' : 'Alles sitzt — nächste Wiederholung in ein paar Tagen.'}</div>
        <div style="margin-top:10px">${navBtn('heute', 'btn primary', 'Weiter →')}</div>`;
    });
  }

  // ---------- Ansicht: Glossar ----------
  function viewGlossar() {
    const rows = DATA.glossary.map(g => `<details class="term glossary-term" data-term="${esc(g.term.toLowerCase())}"><summary>${esc(g.term)}</summary><p>${esc(g.def)}</p></details>`).join('');
    shell('glossar', `
      <h1>Glossar</h1>
      <input type="search" id="gl-search" class="search" placeholder="Begriff suchen … (${DATA.glossary.length} Einträge)">
      <div id="gl-list">${rows}</div>
      <p id="gl-empty" class="muted" style="display:none">Kein Eintrag gefunden — frag deinen Coach, er erklärt es dir und ergänzt den Begriff.</p>
    `);
    $('#gl-search').addEventListener('input', ev => {
      const v = ev.target.value.trim().toLowerCase();
      let visible = 0;
      document.querySelectorAll('.glossary-term').forEach(d => {
        const show = !v || d.dataset.term.includes(v) || d.textContent.toLowerCase().includes(v);
        d.style.display = show ? '' : 'none';
        if (show) visible++;
      });
      $('#gl-empty').style.display = visible ? 'none' : 'block';
    });
  }

  // ---------- Ansicht: Fortschritt ----------
  function viewFortschritt() {
    const s = STORE.get();
    const rDone = moduleRDoneCount();
    const rPct = Math.round(((rDone + (examRPassed() ? 1 : 0)) / (DATA.moduleR.lessons.length + 1)) * 100);
    const p0 = phase0DoneCount();
    const p0Pct = Math.round((p0 / DATA.phase0Lessons.length) * 100);
    const hasResults = Object.keys(s.progress.lessons).length > 0;

    const lessonRows = Object.entries(s.progress.lessons).map(([id, l]) => {
      const title = DATA.lessons[id]?.title || id;
      return `<tr><td>${esc(id)}</td><td>${esc(title)}</td><td>${l.status === 'done' ? '✅ bestanden' : '🔁 in Arbeit'}</td><td>${l.score != null ? Math.round(l.score) + ' %' : '–'}</td><td>${l.attempts || 0}</td></tr>`;
    }).join('');

    const krit = DATA.echtgeldKriterien.map((k, i) => {
      const done = (i === 1 && examRPassed());
      return `<li class="${done ? 'crit-done' : ''}">${done ? '✅' : '⬜'} ${esc(k)}${done ? ' <span class="muted small">(in der App bestanden — Coach bestätigt im Tracker)</span>' : ''}</li>`;
    }).join('');

    shell('fortschritt', `
      <h1>Fortschritt</h1>
      ${hasResults ? '' : `<div class="card next-card"><b>Noch keine Ergebnisse.</b> Starte mit deiner ersten Lektion — sie dauert nur 10–15 Minuten.<br><br>${navBtn('lektion/0.1', 'btn primary', 'Lektion 0.1 starten')}</div>`}
      <div class="card">
        <h2>🛡️ Risikomodul</h2>
        <div class="bar"><div class="bar-fill" style="width:${rPct}%"></div></div>
        <p class="muted">${rDone} / ${DATA.moduleR.lessons.length} Lektionen · Prüfung: ${examRPassed() ? 'bestanden ✅' : 'offen'}</p>
        <h2>Phase 0 — Orientierung</h2>
        <div class="bar"><div class="bar-fill" style="width:${p0Pct}%"></div></div>
        <p class="muted">${p0} / ${DATA.phase0Lessons.length} Lektionen (weitere Inhalte folgen schrittweise)</p>
      </div>
      ${lessonRows ? `<div class="card"><h2>Einzelergebnisse</h2><div class="tablewrap"><table>
        <thead><tr><th>Nr.</th><th>Lektion</th><th>Status</th><th>Beste Punktzahl</th><th>Versuche</th></tr></thead>
        <tbody>${lessonRows}</tbody></table></div>
        <p class="muted small">Versuche werden gezählt, aber nie bestraft — Wiederholen ist Teil des Lernens.</p></div>` : ''}
      <div class="card">
        <h2>Echtgeld-Kriterien</h2>
        <p class="muted small">Die App schaltet Echtgeld niemals frei. Auch bei Erfüllung aller Kriterien gilt: Ausbildungsanforderungen erfüllt — eine eigenständige Entscheidung und ggf. professionelle Beratung bleiben erforderlich.</p>
        <ul class="crit">${krit}</ul>
      </div>
    `);
  }

  // ---------- Ansicht: Einstellungen ----------
  function viewEinstellungen() {
    const s = STORE.get();
    shell('einstellungen', `
      <h1>Einstellungen</h1>
      <div class="card">
        <h2>Profil & Lernkonto</h2>
        <label class="calc-field"><span>Name</span><input type="text" id="set-name" value="${esc(s.profile.name)}" maxlength="40"></label>
        <label class="calc-field"><span>Lernkapital (AED, Simulation)</span><input type="text" inputmode="decimal" id="set-cap" value="${esc(String(s.settings.capitalAED))}"></label>
        <label class="calc-field"><span>Risiko pro Trade</span>
          <select id="set-risk">
            <option value="0.25" ${s.settings.riskPerTradePct === 0.25 ? 'selected' : ''}>0,25 % (vorsichtig — empfohlen für den Start)</option>
            <option value="0.5" ${s.settings.riskPerTradePct === 0.5 ? 'selected' : ''}>0,5 % (Standard der Ausbildung)</option>
            <option value="1" disabled>1 % — erst nach nachgewiesener Kompetenz (Coach schaltet frei)</option>
          </select></label>
        <label class="calc-field"><span>Simulierte Gebühr je Order (AED)</span><input type="text" inputmode="decimal" id="set-fee" value="${esc(String(s.settings.feePerOrderAED))}"></label>
        <button class="btn primary" type="button" id="set-save">Speichern</button>
        <span id="set-msg" class="muted small" aria-live="polite"></span>
      </div>
      <div class="card">
        <h2>Daten</h2>
        <p class="muted small">Alle Daten bleiben auf diesem Gerät. Exportiere regelmäßig eine Sicherung nach <code>03_Backups/</code>.</p>
        <button class="btn" type="button" id="btn-export">⬇️ Fortschritt exportieren (JSON)</button>
        <label class="btn file-btn">⬆️ Fortschritt importieren<input type="file" id="btn-import" accept=".json,application/json" hidden></label>
        <button class="btn danger" type="button" id="btn-reset">🗑️ Alles zurücksetzen</button>
        <div id="data-msg" class="muted small" aria-live="polite" style="margin-top:8px"></div>
        <div id="export-fallback" style="display:none">
          <p class="muted small">Falls kein Download startet (z. B. in der Vorschau): Text unten kopieren und als <code>ta-progress-export.json</code> speichern.</p>
          <textarea id="export-text" class="copybox" rows="6" readonly></textarea>
          <button class="btn" type="button" id="btn-copy">📋 In Zwischenablage kopieren</button>
        </div>
      </div>
      <div class="card muted-card small">
        Trading Academy V1.1 · Build ${esc(DATA.meta.build)} · Nur Simulation, kein echtes Geld, keine Anlageberatung.<br>
        Speicherstatus: ${STORE.storageOk ? '✅ lokale Speicherung aktiv' : '⚠️ Speicherung blockiert (Vorschau) — auf dem Mac öffnen!'}
      </div>
    `);
    const dataMsg = $('#data-msg');

    $('#set-save').addEventListener('click', () => {
      const s2 = STORE.get();
      s2.profile.name = $('#set-name').value.trim() || s2.profile.name;
      const cap = E.parseNum($('#set-cap').value); if (cap > 0) s2.settings.capitalAED = cap;
      s2.settings.riskPerTradePct = parseFloat($('#set-risk').value);
      const fee = E.parseNum($('#set-fee').value); if (fee >= 0) s2.settings.feePerOrderAED = fee;
      STORE.save();
      $('#set-msg').textContent = 'Gespeichert ✓';
      setTimeout(() => { const m = $('#set-msg'); if (m) m.textContent = ''; }, 2000);
    });

    $('#btn-export').addEventListener('click', () => {
      const json = STORE.exportJSON();
      let downloaded = false;
      try {
        const blob = new Blob([json], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `ta-progress-export-${STORE.todayISO()}.json`;
        document.body.appendChild(a); a.click(); a.remove();
        setTimeout(() => URL.revokeObjectURL(a.href), 5000);
        downloaded = true;
      } catch (e) { downloaded = false; }
      // Fallback immer anbieten — in Sandboxen schlägt der Download still fehl.
      $('#export-fallback').style.display = 'block';
      $('#export-text').value = json;
      dataMsg.textContent = downloaded ? 'Export gestartet — prüfe deinen Download-Ordner. Unten zusätzlich der Text zum Kopieren.' : 'Download nicht möglich — bitte Text unten kopieren.';
    });
    $('#btn-copy').addEventListener('click', () => {
      const ta = $('#export-text');
      ta.select();
      let ok = false;
      try { ok = document.execCommand('copy'); } catch (e) {}
      if (!ok && navigator.clipboard) navigator.clipboard.writeText(ta.value).then(() => { dataMsg.textContent = 'Kopiert ✓'; }).catch(() => {});
      else dataMsg.textContent = ok ? 'Kopiert ✓' : 'Bitte manuell kopieren (Cmd+C).';
    });

    $('#btn-import').addEventListener('change', ev => {
      const f = ev.target.files[0];
      if (!f) return;
      const reader = new FileReader();
      reader.onload = () => {
        try { STORE.importJSON(reader.result); dataMsg.textContent = 'Import erfolgreich ✓'; setTimeout(render, 600); }
        catch (e) { dataMsg.textContent = '⚠️ Import fehlgeschlagen: ' + e.message; }
      };
      reader.onerror = () => { dataMsg.textContent = '⚠️ Datei konnte nicht gelesen werden.'; };
      reader.readAsText(f);
    });

    // Zweistufiger Reset ohne confirm() (Dialoge sind in Sandboxen stumm)
    $('#btn-reset').addEventListener('click', () => {
      if ($('#btn-reset-really')) return;
      const b = document.createElement('button');
      b.id = 'btn-reset-really';
      b.type = 'button';
      b.className = 'btn danger';
      b.textContent = '❗ Wirklich ALLES unwiderruflich löschen? → Ja, endgültig löschen';
      b.addEventListener('click', () => { STORE.reset(); go('heute'); });
      dataMsg.textContent = 'Tipp: Vorher exportieren. Der rote Button löscht endgültig.';
      $('#btn-reset').after(b);
    });
  }

  // ---------- Router ----------
  function render() {
    const s = STORE.get();
    if (!s.profile.contractAccepted) { renderOnboarding(); return; }
    const [view, arg] = (CURRENT || 'heute').split('/');
    if (view === 'heute') viewHeute();
    else if (view === 'lernpfad') viewLernpfad();
    else if (view === 'lektion' && arg) viewLektion(arg);
    else if (view === 'pruefung' && arg) viewPruefung(arg);
    else if (view === 'wiederholen') viewWiederholen();
    else if (view === 'glossar') viewGlossar();
    else if (view === 'fortschritt') viewFortschritt();
    else if (view === 'einstellungen') viewEinstellungen();
    else viewHeute();
  }

  function init() {
    STORE.load();
    CURRENT = parseHash() || 'heute';
    render();
  }
  if (document.readyState !== 'loading') init();
  else window.addEventListener('DOMContentLoaded', init);
})();
</script>
<script>
if ('serviceWorker' in navigator && location.protocol.indexOf('http') === 0) {
  navigator.serviceWorker.register('./sw.js').catch(function(){});
}
</script>
</body>
</html>
